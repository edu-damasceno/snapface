server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/mime.types;

    # Additional MIME types
    types {
        application/wasm wasm;
        application/manifest+json webmanifest;
    }

    # Gzip
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json application/wasm;
    gzip_min_length 256;

    # Service worker — must never be cached
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Manifest and registerSW — revalidate on every request
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }

    # Cache hashed assets (immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache WASM files
    location /wasm/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback — index.html must revalidate
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
